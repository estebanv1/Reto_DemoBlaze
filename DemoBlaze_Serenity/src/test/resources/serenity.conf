serenity {
    take.screenshots = AFTER_EACH_STEP
    use.unique.browser=true
    console.colors=true
    compress.filenames = true
    report.accessibility=true
    report.requirement.types="epic, feature"
    test.root=store
    project.name=DemoBlaze_Serenity
    reports.show.step.details = true
    requirements.dir="resources/features"
    outputDirectory = "target/site/serenity"
}

headless.mode = false
webdriver {
  driver = chrome
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
      args = ["remote-allow-origins=*","test-type", "no-sandbox", "ignore-certificate-errors", "start-maximized",
        "incognito", "disable-infobars", "disable-gpu", "disable-default-apps", "disable-popup-blocking",
        "disable-dev-shm-usage", "disable-extensions", "disable-web-security", "disable-translate", "disable-logging"]
    }
  }
}
